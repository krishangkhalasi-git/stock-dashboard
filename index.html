<!DOCTYPE html>
<html>

<head>
    <title>Stock Dashboard</title>
    <script src="app.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            padding: 20px;
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
        }

        canvas {
            background: white;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Stock Dashboard</h1>

<input id="symbol" placeholder="Enter stock (AAPL)">
<button onclick="loadStock()">Search</button>

<h2>Price Chart</h2>
<canvas id="priceChart"></canvas>

<h2>Fundamentals</h2>
<div id="fundamentals"></div>

<h2>News</h2>
<div id="news"></div>

<script src="app.js"></script>

</body>
</html>
